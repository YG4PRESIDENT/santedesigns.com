<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="/santedesigns.com/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SANTE DESIGNS</title>
  <meta name="description" content="SANTE DESIGNS — Fashion and design by Sante">
  <meta name="theme-color" content="#000000">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Inter:wght@400;500&family=Pirata+One&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

  <!-- Preload hero video for instant playback -->
  <link rel="preload" href="assets/video/hero.mp4" as="video" type="video/mp4">

  <!-- Favicon -->
  <link rel="icon" href="assets/img/icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">

  <!-- ====== PORTAL — Full-screen gateway ====== -->
  <div class="c-portal">
    <video class="c-portal__bg"
           autoplay muted loop playsinline webkit-playsinline
           preload="auto"
           poster="assets/video/hero-poster.jpg"
           src="assets/video/hero.mp4">
    </video>

    <div class="c-portal__content">
      <!-- Logo -->
      <div class="c-portal__logo">Santé</div>

      <!-- Navigation -->
      <nav class="c-portal__nav" aria-label="Main navigation">
        <a href="oneofone.html" class="c-portal__link">One of One</a>
        <a href="archive.html" class="c-portal__link">Shop</a>
        <a href="lookbook.html" class="c-portal__link">Lookbook</a>
        <a href="story.html" class="c-portal__link">Our Story</a>
        <a href="donate.html" class="c-portal__link">Donate</a>
      </nav>

      <!-- Social -->
      <div class="c-portal__social">
        <a href="https://instagram.com/santedesigns" target="_blank" rel="noopener" aria-label="Instagram">
          <img src="assets/img/instagram.svg" width="24" height="24" alt="Instagram">
        </a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var v = document.querySelector('.c-portal__bg');
      if (!v) return;

      function tryPlay() {
        v.muted = true;
        v.play().catch(function() {});
      }

      // Try on every loading milestone
      v.addEventListener('loadeddata', tryPlay);
      v.addEventListener('canplay', tryPlay);
      document.addEventListener('DOMContentLoaded', tryPlay);

      // Last resort: if Low Power Mode blocks autoplay,
      // start the video on the first touch anywhere on the page
      document.addEventListener('touchstart', function() {
        tryPlay();
      }, { once: true });
    })();
  </script>
</body>
</html>
