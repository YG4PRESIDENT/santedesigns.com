<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="/santedesigns.com/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANTE DESIGNS | Sound</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="sound">

  <!-- TOP NAV BAR -->
  <header class="site-topnav">
    <a href="./" class="site-topnav__logo">Santé</a>
    <div class="site-topnav__actions">
      <button class="c-nav__cart-btn snipcart-checkout" aria-label="Open cart">
        cart <span class="c-nav__cart-count snipcart-items-count">0</span>
      </button>
      <button class="c-hamburger" data-menu-toggle aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="site-shell">

    <main class="site-main">
      <div class="c-embed" data-animate="fade-up">
        <p class="c-embed__label">the sound</p>
        <h2 style="font-family: var(--f-display); font-size: var(--text-3xl); margin-bottom: var(--s-8);">[Sound]</h2>

        <!-- Spotify embed placeholder -->
        <p style="font-size: var(--text-sm); opacity: 0.5; margin-bottom: var(--s-4);">playlist</p>
        <iframe
          class="c-embed__frame"
          src="https://open.spotify.com/embed/playlist/[PLAYLIST_ID]"
          width="100%"
          height="380"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
          style="border-radius: 0;"
        ></iframe>

        <!-- Apple Music alternative -->
        <!--
        <iframe
          class="c-embed__frame"
          src="https://embed.music.apple.com/us/playlist/[PLAYLIST_ID]"
          width="100%"
          height="450"
          allow="autoplay; clipboard-write; encrypted-media"
          loading="lazy"
        ></iframe>
        -->

        <!-- SoundCloud alternative -->
        <!--
        <iframe
          class="c-embed__frame"
          src="https://w.soundcloud.com/player/?url=[TRACK_URL]&color=%234cff16&auto_play=false"
          width="100%"
          height="166"
          allow="autoplay"
          loading="lazy"
        ></iframe>
        -->
      </div>

      <footer class="c-footer">
        <p class="c-footer__copy">&copy; 2026 Sante Designs. All rights reserved.</p>
        <nav class="c-footer__links" aria-label="Footer navigation">
          <a href="legal/terms.html">Terms</a>
          <a href="legal/privacy.html">Privacy</a>
          <a href="legal/shipping.html">Shipping</a>
          <a href="https://instagram.com/" target="_blank" rel="noopener" aria-label="Instagram" class="c-footer__instagram">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <circle cx="12" cy="12" r="5"/>
              <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </a>
        </nav>
      </footer>
    </main>
  </div>

  <div class="c-menu-overlay" data-menu-overlay aria-hidden="true">
    <button class="c-menu-overlay__close" data-menu-close aria-label="Close menu">[close]</button>
    <a href="./" class="c-menu-overlay__link">home</a>
    <a href="archive.html" class="c-menu-overlay__link">shop</a>
    <a href="lookbook.html" class="c-menu-overlay__link">lookbook</a>
    <a href="story.html" class="c-menu-overlay__link">our story</a>
    <a href="sound.html" class="c-menu-overlay__link">sound</a>
    <a href="drop.html" class="c-menu-overlay__link">drop</a>
    <a href="https://instagram.com/" class="c-menu-overlay__link" target="_blank" rel="noopener" style="font-size: var(--text-lg); opacity: 0.5;">instagram</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
